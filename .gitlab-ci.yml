# ============================================================
# embedded-device-suite GitLab CI/CD
# C++17 / モノレポ。差分ビルド + テスト + カバレッジ + 静的解析
# + clang-tidy + Doxygen + pandoc PDF変換
# ============================================================

variables:
  CMAKE_BUILD_TYPE: Release
  BUILD_IMAGE:      "gcc:7.5"
  ARTIFACT_EXPIRE:  "1 week"
  GCC_COVERAGE_FLAGS: "--coverage -fprofile-arcs -ftest-coverage"

stages:
  - build
  - test
  - coverage
  - docs
  - package

# ── 共通テンプレート ─────────────────────────────────────
.build_defaults: &build_defaults
  image: $BUILD_IMAGE
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq cmake ninja-build libgtest-dev gcovr
    # Google Testをソースからビルド（gcc:7.5イメージ向け）
    - cmake -B /tmp/gtest-build /usr/src/gtest -DCMAKE_BUILD_TYPE=Release
    - cmake --build /tmp/gtest-build
    - cp /tmp/gtest-build/lib/libgtest*.a /usr/lib/
  tags:
    - docker

# ============================================================
# driver ビルド
# ============================================================
build:driver:
  <<: *build_defaults
  stage: build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [driver/**/*, CMakeLists.txt]
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: [driver/**/*]
    - if: '$CI_COMMIT_TAG =~ /^driver\/v/'
  script:
    - cmake -B build/driver -S driver/ -DCMAKE_BUILD_TYPE=$CMAKE_BUILD_TYPE -G Ninja
    - cmake --build build/driver
  artifacts:
    name: "driver-${CI_COMMIT_SHORT_SHA}"
    paths: [build/driver/libspi_driver.a]
    expire_in: $ARTIFACT_EXPIRE

# ============================================================
# lib ビルド
# ============================================================
build:lib:
  <<: *build_defaults
  stage: build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [lib/**/*, driver/**/*, CMakeLists.txt]
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: [lib/**/*, driver/**/*]
    - if: '$CI_COMMIT_TAG =~ /^lib\/v/'
  script:
    - cmake -B build/lib -S lib/ -DCMAKE_BUILD_TYPE=$CMAKE_BUILD_TYPE -G Ninja
    - cmake --build build/lib
  artifacts:
    name: "lib-${CI_COMMIT_SHORT_SHA}"
    paths: [build/lib/libdevice.so*]
    expire_in: $ARTIFACT_EXPIRE

# ============================================================
# cli ビルド
# ============================================================
build:cli:
  <<: *build_defaults
  stage: build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [cli/**/*, lib/**/*, driver/**/*, CMakeLists.txt]
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: [cli/**/*, lib/**/*]
    - if: '$CI_COMMIT_TAG =~ /^cli\/v/'
  script:
    - cmake -B build -S . -DCMAKE_BUILD_TYPE=$CMAKE_BUILD_TYPE -G Ninja
    - cmake --build build --target device-ctl
  artifacts:
    name: "cli-${CI_COMMIT_SHORT_SHA}"
    paths: [build/device-ctl]
    expire_in: $ARTIFACT_EXPIRE

# ============================================================
# 静的解析（cppcheck）
# ============================================================
lint:cppcheck:
  image: $BUILD_IMAGE
  stage: build
  before_script:
    - apt-get update -qq && apt-get install -y -qq cppcheck
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: ["**/*.cpp", "**/*.hpp"]
  script:
    - cppcheck
        --enable=warning,performance,portability
        --std=c++17
        --error-exitcode=1
        --suppress=missingIncludeSystem
        --xml --xml-version=2
        driver/src/ lib/src/ cli/src/
        2> cppcheck-report.xml
    - echo "cppcheck passed"
  artifacts:
    name: "cppcheck-${CI_COMMIT_SHORT_SHA}"
    paths: [cppcheck-report.xml]
    expire_in: $ARTIFACT_EXPIRE
    when: always

# ============================================================
# clang-tidy（GCCビルドとは独立して実行可能）
#
# clang-tidy はコンパイラを切り替えなくても使える。
# compile_commands.json（CMakeが生成）を読んで解析する。
# ============================================================
lint:clang-tidy:
  image: "silkeh/clang:15"   # clang-tidy が入った公式イメージ
  stage: build
  before_script:
    - apt-get update -qq && apt-get install -y -qq cmake ninja-build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: ["**/*.cpp", "**/*.hpp"]
  script:
    # compile_commands.json を生成（これが clang-tidy の入力になる）
    - cmake -B build -S .
        -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
        -DCMAKE_BUILD_TYPE=Debug
        -G Ninja
    # GCCフラグを clang が解釈できるよう不要なものを除外してから実行
    - clang-tidy
        -p build/
        --checks='-*,bugprone-*,modernize-use-nullptr,modernize-use-override,performance-*'
        --warnings-as-errors='bugprone-*'
        driver/src/spi_driver.cpp
        lib/src/device.cpp
        cli/src/main.cpp
  artifacts:
    name: "clang-tidy-${CI_COMMIT_SHORT_SHA}"
    paths: []
    expire_in: $ARTIFACT_EXPIRE
    when: on_failure

# ============================================================
# 単体テスト（Google Test / JUnit XML出力）
# ============================================================
test:unit:driver:
  <<: *build_defaults
  stage: test
  needs: [build:driver]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [driver/**/*, tests/unit/driver/**/*]
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: [driver/**/*, tests/unit/driver/**/*]
  script:
    - cmake -B build/test-driver -S driver/
        -DCMAKE_BUILD_TYPE=Debug
        -DCMAKE_CXX_FLAGS="$GCC_COVERAGE_FLAGS"
        -G Ninja
    - cmake --build build/test-driver
    - cmake -B build/test-driver-tests -S tests/unit/driver/
        -DCMAKE_BUILD_TYPE=Debug
        -G Ninja
    - cmake --build build/test-driver-tests
    - mkdir -p test-results
    - build/test-driver-tests/test_spi_driver
        --gtest_output=xml:test-results/driver-unit.xml
  artifacts:
    name: "test-driver-${CI_COMMIT_SHORT_SHA}"
    paths:
      - test-results/driver-unit.xml
      - "**/*.gcno"
      - "**/*.gcda"
    reports:
      junit: test-results/driver-unit.xml
    expire_in: $ARTIFACT_EXPIRE
    when: always

test:unit:lib:
  <<: *build_defaults
  stage: test
  needs: [build:lib]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [lib/**/*, driver/**/*, tests/unit/lib/**/*]
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: [lib/**/*, tests/unit/lib/**/*]
  script:
    - cmake -B build/test-lib -S lib/
        -DCMAKE_BUILD_TYPE=Debug
        -DCMAKE_CXX_FLAGS="$GCC_COVERAGE_FLAGS"
        -G Ninja
    - cmake --build build/test-lib
    - cmake -B build/test-lib-tests -S tests/unit/lib/
        -DCMAKE_BUILD_TYPE=Debug
        -G Ninja
    - cmake --build build/test-lib-tests
    - mkdir -p test-results
    - build/test-lib-tests/test_device
        --gtest_output=xml:test-results/lib-unit.xml
  artifacts:
    name: "test-lib-${CI_COMMIT_SHORT_SHA}"
    paths:
      - test-results/lib-unit.xml
      - "**/*.gcno"
      - "**/*.gcda"
    reports:
      junit: test-results/lib-unit.xml
    expire_in: $ARTIFACT_EXPIRE
    when: always

# ============================================================
# 結合テスト（実機なし環境では GTEST_SKIP で全テストをスキップ）
# ============================================================
test:integration:
  <<: *build_defaults
  stage: test
  needs: [build:driver, build:lib]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [tests/integration/**/*, driver/**/*, lib/**/*]
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: [tests/integration/**/*]
  script:
    - cmake -B build/driver -S driver/ -DCMAKE_BUILD_TYPE=Debug -G Ninja
    - cmake --build build/driver
    - cmake --install build/driver --prefix /usr/local
    - cmake -B build/lib -S lib/ -DCMAKE_BUILD_TYPE=Debug -G Ninja
    - cmake --build build/lib
    - cmake --install build/lib --prefix /usr/local
    - ldconfig
    - cmake -B build/test-integration -S tests/integration/
        -DCMAKE_BUILD_TYPE=Debug
        -DCMAKE_CXX_FLAGS="-I${CI_PROJECT_DIR}/lib/include -I${CI_PROJECT_DIR}/driver/include"
        -G Ninja
    - cmake --build build/test-integration
    - mkdir -p test-results
    - build/test-integration/test_spi_loopback
        --gtest_output=xml:test-results/integration.xml
  artifacts:
    name: "test-integration-${CI_COMMIT_SHORT_SHA}"
    paths:
      - test-results/integration.xml
    reports:
      junit: test-results/integration.xml
    expire_in: $ARTIFACT_EXPIRE
    when: always

# ============================================================
# カバレッジレポート（lcov → HTML + Cobertura XML）
# ============================================================
coverage:report:
  <<: *build_defaults
  stage: coverage
  needs: [test:unit:driver, test:unit:lib]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  before_script:
    - apt-get update -qq && apt-get install -y -qq gcovr
  script:
    - mkdir -p coverage
    - gcovr
        --root .
        --exclude 'tests/'
        --exclude '/usr/'
        --html-details coverage/index.html
        --xml coverage/cobertura.xml
        --print-summary
  coverage: '/^TOTAL.*\s+(\d+\%)$/'
  artifacts:
    name: "coverage-${CI_COMMIT_SHORT_SHA}"
    paths: [coverage/]
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura.xml
    expire_in: $ARTIFACT_EXPIRE

# ============================================================
# Doxygen API ドキュメント生成
# ============================================================
docs:doxygen:
  image: "debian:bullseye-slim"
  stage: docs
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq doxygen graphviz
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: ["**/*.hpp", "**/*.cpp", README.md, Doxyfile]
    - if: '$CI_COMMIT_TAG =~ /^(driver|lib|cli)\/v/'
  script:
    - doxygen Doxyfile
    - echo "Doxygen warnings:"
    - cat docs/doxygen/doxygen-warnings.log || true
  artifacts:
    name: "doxygen-${CI_COMMIT_SHORT_SHA}"
    paths: [docs/doxygen/html/]
    expire_in: "2 weeks"

# ============================================================
# pandoc: Markdown設計書 → PDF 変換
#
# 運用方針:
#   - Markdown を「ソース」、PDF を「納品物の出力」と割り切る
#   - タグ push 時だけ PDF を生成して Artifacts に保存する
# ============================================================
docs:pdf:
  image: "pandoc/latex:3"
  stage: docs
  rules:
    - if: '$CI_COMMIT_TAG =~ /^(driver|lib|cli)\/v/'
  script:
    - mkdir -p output/pdf
    # 設計書・仕様書を PDF に変換（日本語対応: xelatex）
    - |
      for f in \
        docs/01_requirements/requirements-spec.md \
        docs/02_basic-design/system-architecture.md \
        docs/03_detailed-design/driver-design.md \
        docs/04_api-spec/libdevice-api.md \
        docs/05_interface-spec/spi-hardware-if.md \
        docs/06_test/test-plan.md \
        docs/07_delivery/release-notes/v1.1.0.md; do
        name=$(basename "$f" .md)
        pandoc "$f" \
          --pdf-engine=xelatex \
          -V mainfont="Noto Serif CJK JP" \
          -V geometry:margin=25mm \
          -o "output/pdf/${name}.pdf"
        echo "  converted: ${name}.pdf"
      done
  artifacts:
    name: "docs-pdf-${CI_COMMIT_TAG//\//-}"
    paths: [output/pdf/]
    expire_in: "4 weeks"

# ============================================================
# リリースパッケージ（タグ push 時）
# ============================================================
package:release:
  <<: *build_defaults
  stage: package
  rules:
    - if: '$CI_COMMIT_TAG =~ /^(driver|lib|cli)\/v/'
  script:
    - cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -G Ninja
    - cmake --build build
    - cmake --install build --prefix dist/
    - tar czf embedded-device-suite-${CI_COMMIT_TAG//\//-}.tar.gz -C dist .
  artifacts:
    name: "release-${CI_COMMIT_TAG//\//-}"
    paths: ["*.tar.gz"]
    expire_in: "4 weeks"
