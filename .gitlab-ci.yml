# ============================================================
# embedded-device-suite GitLab CI/CD
# C++11 / モノレポ構成。変更のあったコンポーネントのみビルドする。
# ============================================================

# ── グローバル変数 ──────────────────────────────────────────
variables:
  CMAKE_BUILD_TYPE: Release
  # Dockerイメージでコンパイラバージョンを固定する
  # ローカルGitLabRunnerでも同じイメージを pull して使う
  BUILD_IMAGE: "gcc:7.5"   # GCC 7 = C++11/14 サポート / 組み込み相当
  ARTIFACT_EXPIRE: "1 week"

# ── ステージ定義 ──────────────────────────────────────────
stages:
  - build
  - test
  - package

# ── 共通テンプレート ──────────────────────────────────────
.build_defaults: &build_defaults
  image: $BUILD_IMAGE
  before_script:
    - apt-get update -qq && apt-get install -y -qq cmake ninja-build
  tags:
    - docker   # GitLab Runner に docker タグが付いていること

# ============================================================
# driver ビルド
# ============================================================
build:driver:
  <<: *build_defaults
  stage: build
  rules:
    # driver/ 以下が変更された MR / push でのみ実行
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - driver/**/*
        - CMakeLists.txt
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - driver/**/*
    # タグ push は常に実行（リリースビルド）
    - if: '$CI_COMMIT_TAG =~ /^driver\/v/'
  script:
    - cmake -B build/driver -S driver/
        -DCMAKE_BUILD_TYPE=$CMAKE_BUILD_TYPE
        -G Ninja
    - cmake --build build/driver
  artifacts:
    name: "driver-${CI_COMMIT_SHORT_SHA}"
    paths:
      - build/driver/libspi_driver.a
    expire_in: $ARTIFACT_EXPIRE

# ============================================================
# lib ビルド
# ============================================================
build:lib:
  <<: *build_defaults
  stage: build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - lib/**/*
        - driver/**/*   # libはdriverに依存するため
        - CMakeLists.txt
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - lib/**/*
        - driver/**/*
    - if: '$CI_COMMIT_TAG =~ /^lib\/v/'
  script:
    - cmake -B build/lib -S lib/
        -DCMAKE_BUILD_TYPE=$CMAKE_BUILD_TYPE
        -G Ninja
    - cmake --build build/lib
  artifacts:
    name: "lib-${CI_COMMIT_SHORT_SHA}"
    paths:
      - build/lib/libdevice.so*
    expire_in: $ARTIFACT_EXPIRE

# ============================================================
# cli ビルド
# ============================================================
build:cli:
  <<: *build_defaults
  stage: build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - cli/**/*
        - lib/**/*      # cliはlibに依存する
        - driver/**/*
        - CMakeLists.txt
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - cli/**/*
        - lib/**/*
    - if: '$CI_COMMIT_TAG =~ /^cli\/v/'
  script:
    - cmake -B build -S .
        -DCMAKE_BUILD_TYPE=$CMAKE_BUILD_TYPE
        -G Ninja
    - cmake --build build --target device-ctl
  artifacts:
    name: "cli-${CI_COMMIT_SHORT_SHA}"
    paths:
      - build/device-ctl
    expire_in: $ARTIFACT_EXPIRE

# ============================================================
# 静的解析（全コンポーネント共通）
# ============================================================
lint:cppcheck:
  image: $BUILD_IMAGE
  stage: test
  before_script:
    - apt-get update -qq && apt-get install -y -qq cppcheck
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - "**/*.cpp"
        - "**/*.hpp"
  script:
    - cppcheck
        --enable=warning,performance,portability
        --std=c++11
        --error-exitcode=1
        --suppress=missingIncludeSystem
        driver/src/ lib/src/ cli/src/
  allow_failure: false

# ============================================================
# パッケージ（タグ push 時のみ）
# ============================================================
package:release:
  <<: *build_defaults
  stage: package
  rules:
    # driver/v* lib/v* cli/v* いずれかのタグで発火
    - if: '$CI_COMMIT_TAG =~ /^(driver|lib|cli)\/v/'
  script:
    - cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -G Ninja
    - cmake --build build
    - cmake --install build --prefix dist/
    - tar czf embedded-device-suite-${CI_COMMIT_TAG//\//-}.tar.gz -C dist .
  artifacts:
    name: "release-${CI_COMMIT_TAG//\//-}"
    paths:
      - "*.tar.gz"
    expire_in: "4 weeks"
