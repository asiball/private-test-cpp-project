name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git describe でタグを取得するため全履歴が必要

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ cmake make git libgtest-dev gcovr

      - name: Build GTest from source
        run: |
          cmake -B /tmp/gtest-build /usr/src/googletest \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/gtest-build
          sudo cmake --install /tmp/gtest-build --prefix /usr/local

      - name: CMake Release build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Driver unit tests
        run: |
          cmake -S driver -B build/driver-debug -DCMAKE_BUILD_TYPE=Debug
          cmake --build build/driver-debug -j$(nproc)
          sudo cmake --install build/driver-debug --prefix /usr/local
          cmake -S tests/unit/driver -B build/test-driver \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-I${{ github.workspace }}/driver/include"
          cmake --build build/test-driver -j$(nproc)
          mkdir -p test-results
          ./build/test-driver/test_spi_driver \
            --gtest_output=xml:test-results/driver-unit.xml || true

      - name: Lib unit tests
        run: |
          cmake -S lib -B build/lib-debug -DCMAKE_BUILD_TYPE=Debug
          cmake --build build/lib-debug -j$(nproc)
          sudo cmake --install build/lib-debug --prefix /usr/local
          sudo ldconfig
          cmake -S tests/unit/lib -B build/test-lib \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-I${{ github.workspace }}/lib/include -I${{ github.workspace }}/tests/mocks"
          cmake --build build/test-lib -j$(nproc)
          ./build/test-lib/test_device \
            --gtest_output=xml:test-results/lib-unit.xml || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

  coverage:
    runs-on: ubuntu-24.04
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ cmake make git libgtest-dev gcovr

      - name: Build GTest from source
        run: |
          cmake -B /tmp/gtest-build /usr/src/googletest \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/gtest-build
          sudo cmake --install /tmp/gtest-build --prefix /usr/local

      - name: Build driver with coverage flags
        run: |
          cmake -S driver -B build/driver-cov \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage"
          cmake --build build/driver-cov -j$(nproc)
          sudo cmake --install build/driver-cov --prefix /usr/local

      - name: Build lib with coverage flags
        run: |
          cmake -S lib -B build/lib-cov \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage"
          cmake --build build/lib-cov -j$(nproc)
          sudo cmake --install build/lib-cov --prefix /usr/local
          sudo ldconfig

      - name: Run driver tests (coverage)
        run: |
          cmake -S tests/unit/driver -B build/test-driver-cov \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-I${{ github.workspace }}/driver/include"
          cmake --build build/test-driver-cov -j$(nproc)
          mkdir -p test-results
          ./build/test-driver-cov/test_spi_driver \
            --gtest_output=xml:test-results/driver-unit.xml || true

      - name: Run lib tests (coverage)
        run: |
          cmake -S tests/unit/lib -B build/test-lib-cov \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-I${{ github.workspace }}/lib/include -I${{ github.workspace }}/tests/mocks"
          cmake --build build/test-lib-cov -j$(nproc)
          ./build/test-lib-cov/test_device \
            --gtest_output=xml:test-results/lib-unit.xml || true

      - name: Generate coverage report
        run: |
          mkdir -p coverage
          gcovr \
            --root . \
            --exclude 'tests/' \
            --exclude '/usr/' \
            --html-details coverage/index.html \
            --xml coverage/cobertura.xml \
            --print-summary

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --std=c++17 \
            --suppress=missingIncludeSystem \
            --error-exitcode=1 \
            driver/src/ lib/src/ cli/src/

  docs:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Doxygen and Graphviz
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Generate Doxygen docs
        run: |
          mkdir -p docs/doxygen
          doxygen Doxyfile

      - name: Upload HTML docs
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-html
          path: docs/doxygen/html/
