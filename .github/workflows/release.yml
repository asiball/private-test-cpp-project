name: Release

# spi-hal/v*, lib/v*, cli/v* のいずれかのタグが push されたときに実行
on:
  push:
    tags:
      - 'spi-hal/v*'
      - 'lib/v*'
      - 'cli/v*'

# CHANGELOG.md の commit push と GitHub Release 作成に書き込み権限が必要
permissions:
  contents: write

jobs:
  changelog-and-release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # git-cliff が全コミット履歴を必要とするため

      # git-cliff でコミット履歴から CHANGELOG.md を生成
      # orhun/git-cliff-action はシングルバイナリをダウンロードするため Rust 不要
      - name: Generate CHANGELOG with git-cliff
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      # 生成した CHANGELOG.md を main ブランチにコミット
      - name: Commit CHANGELOG.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          # 変更がある場合のみコミット（初回タグ以外は差分あり）
          git diff --cached --quiet || \
            git commit -m "chore: update CHANGELOG.md for ${{ github.ref_name }}"
          git push origin HEAD:main

      # GitHub Release を作成し、CHANGELOG.md の内容をリリースノートとして使用
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
